<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiVMOR GADGETS - Stock Value Tracker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f6f9;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .app-container {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 30px 24px;
            box-sizing: border-box;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .brand-logo {
            text-align: center;
            margin-bottom: 25px;
        }
        .brand-logo h1 {
            margin: 0;
            font-size: 26px;
            color: #0b3c5d;
            letter-spacing: 0.5px;
            font-weight: 800;
        }
        .brand-logo p {
            margin: 6px 0 0 0;
            font-size: 11px;
            color: #8a99ad;
            letter-spacing: 1.5px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .sheet-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px 5px;
            border: 1px solid #cbd5e1;
            background-color: #ffffff;
            color: #334155;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            transition: all 0.2s ease;
        }
        .tab-btn.active {
            background-color: #15803d; 
            color: white;
            border-color: #15803d;
        }

        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }
        .spinner-3d {
            width: 44px;
            height: 44px;
            border: 5px solid #e2e8f0;
            border-top: 5px solid #15803d;
            border-radius: 50%;
            animation: spin3d 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        @keyframes spin3d {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loader-text {
            margin-top: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
        }

        .filter-group {
            margin-bottom: 18px;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            background-color: #fff;
            color: #1e293b;
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s ease-in-out;
        }
        
        .search-title {
            font-size: 12px;
            font-weight: 700;
            color: #16a34a;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        .button-group {
            display: flex;
            gap: 14px;
            margin-top: 28px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.15s ease;
            outline: none;
        }
        .btn-primary {
            background-color: #15803d;
            color: white;
        }
        .btn-secondary {
            background-color: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
        }
        
        .table-container {
            width: 100%;
            margin-top: 25px;
            border: 1px solid #b4c6e7;
            background-color: #fff;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .table-header-main {
            background-color: #d9e1f2;
            color: #5b3194;
            font-weight: 800;
            font-style: italic;
            font-size: 15px;
            text-align: center;
            padding: 8px;
            border: 1px solid #b4c6e7;
        }
        th {
            border: 1px solid #b4c6e7;
            padding: 8px 6px;
            font-weight: 700;
            text-align: center;
        }
        th.col-comp { color: #2f5597; background-color: #d9e1f2; text-align: left; padding-left: 10px;}
        th.col-stock { color: #2f5597; background-color: #fce4d6; }
        th.col-val { color: #c00000; background-color: #fce4d6; }
        
        td {
            padding: 8px 6px;
            border: 1px solid #b4c6e7;
            color: #000;
            vertical-align: middle;
        }
        .td-company {
            font-weight: 700;
            text-transform: uppercase;
            padding-left: 10px;
            background-color: #fff;
        }
        
        .bar-cell {
            text-align: right;
            padding-right: 10px;
            font-weight: 600;
        }

        .tr-total td {
            font-weight: 800;
            font-size: 14px;
            border: 2px solid #000;
            padding: 10px 6px;
        }
        .total-label {
            background-color: #ffff00;
            text-align: center;
        }
        .total-stock-val {
            background-color: #1f4e78;
            color: #fff;
            text-align: right;
            padding-right: 10px;
        }
        .total-price-val {
            background-color: #ffff00;
            color: #ff0000;
            text-align: right;
            padding-right: 10px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="brand-logo">
            <h1>SiVMOR VALUE</h1>
            <p>STOCK VALUE TRACKER</p>
        </div>

        <div class="sheet-tabs" id="sheetTabs" style="display: none;">
            <button class="tab-btn" id="btn-Sheet2" onclick="switchSheet('Sheet2')">Sheet 2</button>
            <button class="tab-btn" id="btn-Sheet3" onclick="switchSheet('Sheet3')">Sheet 3</button>
        </div>

        <div id="loader-overlay" class="loader-container">
            <div class="spinner-3d"></div>
            <div class="loader-text">Loading database configuration...</div>
        </div>

        <div id="app-content" style="display: none;">
            <div class="filter-group">
                <div class="search-title" id="searchTitle">QUICK ITEM WISE SEARCH • READY (0)</div>
                <input type="text" id="itemSearchInput" list="itemOptions" placeholder="Type name here (e.g. 17 iphone)..." disabled autocomplete="off">
                <datalist id="itemOptions"></datalist>
            </div>

            <div class="button-group">
                <button class="btn btn-primary" id="searchBtn">Search Filter</button>
                <button class="btn btn-secondary" id="resetBtn">Reset All</button>
            </div>

            <div id="resultsSection" style="display: none;">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th colspan="3" class="table-header-main">SMART MOBILE + TAB</th>
                            </tr>
                            <tr>
                                <th class="col-comp">COMPANY</th>
                                <th class="col-stock">STOCK AVAIL.</th>
                                <th class="col-val">STOCK VALUE</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE_API_URL = "https://script.google.com/macros/s/AKfycbxu8fk3RE7uEDawYBdYWyKOVK9sr1ku2L3kilyF6Uq4cpM4T4bS9lwMJRZWS7ixVpO-/exec";

        let rawRows = [];
        let rawHeaders = [];
        let currentActiveSheet = "Sheet2"; 

        const itemSearchInput = document.getElementById('itemSearchInput');
        const itemOptions = document.getElementById('itemOptions');
        const searchTitle = document.getElementById('searchTitle');
        const searchBtn = document.getElementById('searchBtn');
        const resetBtn = document.getElementById('resetBtn');
        const resultsSection = document.getElementById('resultsSection');
        const inventoryTableBody = document.getElementById('inventoryTableBody');
        const loaderOverlay = document.getElementById('loader-overlay');
        const appContent = document.getElementById('app-content');

        const exclusionFields = ["COMPANY", "PRODUCT CATEGORY", "Item/Model", "STATUS", "MOP", "TOTAL STOCK", "TOTAL OUTSTANDING", "MAY Mtd", "JUNE Mtd", "JULY Mtd"];

        function getSheetFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('sheet') || "Sheet2";
        }

        async function loadData(sheetName) {
            currentActiveSheet = sheetName;
            appContent.style.display = 'none';
            resultsSection.style.display = 'none';
            loaderOverlay.style.display = 'flex';
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            const currentTab = document.getElementById(`btn-${sheetName}`);
            if(currentTab) currentTab.classList.add('active');

            try {
                const response = await fetch(`${BASE_API_URL}?sheet=${sheetName}`);
                const json = await response.json();
                
                rawRows = json.rows || [];
                rawHeaders = json.headers || [];

                loaderOverlay.style.display = 'none';
                appContent.style.display = 'block';
                document.getElementById('sheetTabs').style.display = 'flex';

                resetApp();
            } catch (error) {
                console.error(error);
                const textElement = loaderOverlay.querySelector('.loader-text');
                if(textElement) textElement.innerHTML = "<span style='color:#e74c3c;'>❌ Failed to load dataset.</span>";
            }
        }

        function formatIndianCurrency(num) {
            return '₹ ' + Number(num).toLocaleString('en-IN');
        }

        function generateCompanySummaryReport() {
            const targetCategories = ["SMART MOBILE", "TABLET"];
            const typedValue = itemSearchInput.value.trim().toLowerCase();
            
            let summaryMap = {};
            let grandTotalStock = 0;
            let grandTotalValue = 0;

            rawRows.forEach(row => {
                const cat = String(row["PRODUCT CATEGORY"] || '').toUpperCase().trim();
                if (!targetCategories.includes(cat)) return;

                if (typedValue && !String(row["Item/Model"]).toLowerCase().includes(typedValue)) return;

                const company = String(row["COMPANY"] || 'UNKNOWN').trim().toUpperCase();
                
                let rowStock = 0;
                let rowValue = 0;

                // Safely read values based directly on header names to prevent indexing mixups
                Object.keys(row).forEach(key => {
                    if (exclusionFields.includes(key)) return;
                    
                    // Value column entries usually contain decimal values or larger currency representations
                    const val = parseFloat(row[key]) || 0;
                    
                    if (val > 0) {
                        // If it's a whole, smaller integer number, count it as stock count, otherwise add to valuation pool
                        if (Number.isInteger(val) && val < 5000) { 
                            rowStock += val;
                        } else {
                            rowValue += val;
                        }
                    }
                });

                if (rowStock > 0 || rowValue > 0) {
                    if (!summaryMap[company]) {
                        summaryMap[company] = { stock: 0, value: 0 };
                    }
                    summaryMap[company].stock += rowStock;
                    summaryMap[company].value += rowValue;
                }
            });

            // Calculate correct Totals
            Object.values(summaryMap).forEach(c => {
                grandTotalStock += c.stock;
                grandTotalValue += c.value;
            });

            // Peak calculation values for clear comparative visual gradient sizes
            let maxStock = Math.max(...Object.values(summaryMap).map(o => o.stock), 1);
            let maxValue = Math.max(...Object.values(summaryMap).map(o => o.value), 1);

            inventoryTableBody.innerHTML = "";
            const sortedCompanies = Object.keys(summaryMap).sort();

            if (sortedCompanies.length === 0) {
                inventoryTableBody.innerHTML = `<tr><td colspan="3" class="text-center" style="color:#999; padding: 20px;">No matching records found</td></tr>`;
                resultsSection.style.display = 'block';
                return;
            }

            sortedCompanies.forEach(company => {
                const data = summaryMap[company];
                const stockPct = (data.stock / maxStock) * 100;
                const valuePct = (data.value / maxValue) * 100;

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="td-company">${company}</td>
                    <td class="bar-cell" style="background: linear-gradient(to right, #6ec6ff ${stockPct}%, transparent ${stockPct}%); background-color:#eaeaea50;">${data.stock}</td>
                    <td class="bar-cell" style="background: linear-gradient(to right, #90caf9 ${valuePct}%, transparent ${valuePct}%); background-color:#eaeaea50;">${formatIndianCurrency(Math.round(data.value))}</td>
                `;
                inventoryTableBody.appendChild(row);
            });

            const totalRow = document.createElement('tr');
            totalRow.className = "tr-total";
            totalRow.innerHTML = `
                <td class="total-label">TOTAL</td>
                <td class="total-stock-val">${grandTotalStock}</td>
                <td class="total-price-val">${formatIndianCurrency(Math.round(grandTotalValue))}</td>
            `;
            inventoryTableBody.appendChild(totalRow);

            resultsSection.style.display = 'block';
            resultsSection.scrollIntoView({ behavior: 'smooth' });
        }

        function resetApp() {
            itemSearchInput.value = "";
            searchTitle.innerText = `QUICK ITEM WISE SEARCH • READY (${rawRows.length})`;
            
            itemOptions.innerHTML = "";
            itemSearchInput.disabled = rawRows.length === 0;
            
            let uniqueness = new Set();
            rawRows.forEach(row => {
                const model = row["Item/Model"];
                if(model && !uniqueness.has(model)) {
                    uniqueness.add(model);
                    const option = document.createElement('option');
                    option.value = model;
                    itemOptions.appendChild(option);
                }
            });

            generateCompanySummaryReport();
        }

        function switchSheet(sheetName) {
            if(sheetName === currentActiveSheet) return;
            const nextUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?sheet=' + sheetName;
            window.history.pushState({path:nextUrl}, '', nextUrl);
            loadData(sheetName);
        }

        searchBtn.addEventListener('click', generateCompanySummaryReport);
        resetBtn.addEventListener('click', resetApp);
        itemSearchInput.addEventListener('input', () => { resultsSection.style.display = 'none'; });

        loadData(getSheetFromUrl());
    </script>
</body>
</html>
