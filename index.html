<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiVMOR GADGETS - Stock Value Tracker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f6f9;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .app-container {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 30px 24px;
            box-sizing: border-box;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .brand-logo {
            text-align: center;
            margin-bottom: 25px;
        }
        .brand-logo h1 {
            margin: 0;
            font-size: 26px;
            color: #0b3c5d;
            letter-spacing: 0.5px;
            font-weight: 800;
        }
        .brand-logo p {
            margin: 6px 0 0 0;
            font-size: 11px;
            color: #8a99ad;
            letter-spacing: 1.5px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }
        .spinner-3d {
            width: 44px;
            height: 44px;
            border: 5px solid #e2e8f0;
            border-top: 5px solid #15803d;
            border-radius: 50%;
            animation: spin3d 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        @keyframes spin3d {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loader-text {
            margin-top: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
        }

        .filter-group {
            margin-bottom: 18px;
        }
        select {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            background-color: #fff;
            color: #1e293b;
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s ease-in-out;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 18px center;
            cursor: pointer;
        }
        select:focus {
            border-color: #94a3b8;
        }
        select:disabled {
            background-color: #f8fafc;
            color: #94a3b8;
            border-color: #e2e8f0;
            cursor: not-allowed;
        }
        
        .button-group {
            display: flex;
            gap: 14px;
            margin-top: 20px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.15s ease;
            outline: none;
        }
        .btn-primary {
            background-color: #15803d;
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            background-color: #166534;
        }
        .btn-secondary {
            background-color: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
        }
        .btn-secondary:hover {
            background-color: #e2e8f0;
        }
        
        .table-container {
            width: 100%;
            margin-top: 25px;
            border: 1px solid #b4c6e7;
            background-color: #fff;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .table-header-main {
            background-color: #d9e1f2;
            color: #5b3194;
            font-weight: 800;
            font-style: italic;
            font-size: 15px;
            text-align: center;
            padding: 8px;
            border: 1px solid #b4c6e7;
        }
        th {
            border: 1px solid #b4c6e7;
            padding: 8px 6px;
            font-weight: 700;
            text-align: center;
        }
        th.col-comp { color: #2f5597; background-color: #d9e1f2; text-align: left; padding-left: 10px;}
        th.col-stock { color: #2f5597; background-color: #e2efda; }
        th.col-val { color: #c00000; background-color: #fce4d6; }
        
        td {
            padding: 8px 6px;
            border: 1px solid #b4c6e7;
            color: #000;
            vertical-align: middle;
        }
        .td-category {
            font-weight: 700;
            text-transform: uppercase;
            padding-left: 10px;
            background-color: #fff;
        }
        
        .data-cell {
            text-align: right;
            padding-right: 10px;
            font-weight: 600;
            background-color: #ffffff;
        }

        .tr-total td {
            font-weight: 800;
            font-size: 14px;
            border: 2px solid #000;
            padding: 10px 6px;
        }
        .total-label {
            background-color: #ffff00;
            text-align: center;
        }
        .total-stock-val {
            background-color: #1f4e78;
            color: #fff;
            text-align: right;
            padding-right: 10px;
        }
        .total-price-val {
            background-color: #ffff00;
            color: #ff0000;
            text-align: right;
            padding-right: 10px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="brand-logo">
            <h1>SiVMOR VALUE</h1>
            <p>STOCK VALUE TRACKER</p>
        </div>

        <div id="loader-overlay" class="loader-container">
            <div class="spinner-3d"></div>
            <div class="loader-text">Loading database configuration...</div>
        </div>

        <div id="app-content" style="display: none;">
            <div class="filter-group">
                <select id="storeSelect">
                    <option value="">-- SELECT STORE NAME --</option>
                </select>
            </div>

            <div class="button-group">
                <button class="btn btn-primary" id="searchBtn">Search Filter</button>
                <button class="btn btn-secondary" id="resetBtn">Reset All</button>
            </div>

            <div id="resultsSection" style="display: none;">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th colspan="3" class="table-header-main" id="tableMainHeader">STORE DATA VIEW</th>
                            </tr>
                            <tr>
                                <th class="col-comp">PRODUCT CATEGORY</th>
                                <th class="col-stock">VOLUME</th>
                                <th class="col-val">VALUE</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE_API_URL = "https://script.google.com/macros/s/AKfycbxu8fk3RE7uEDawYBdYWyKOVK9sr1ku2L3kilyF6Uq4cpM4T4bS9lwMJRZWS7ixVpO-/exec?sheet=Sheet3";

        let rawRows = [];

        const storeSelect = document.getElementById('storeSelect');
        const searchBtn = document.getElementById('searchBtn');
        const resetBtn = document.getElementById('resetBtn');
        const resultsSection = document.getElementById('resultsSection');
        const inventoryTableBody = document.getElementById('inventoryTableBody');
        const tableMainHeader = document.getElementById('tableMainHeader');
        const loaderOverlay = document.getElementById('loader-overlay');
        const appContent = document.getElementById('app-content');

        async function loadData() {
            appContent.style.display = 'none';
            resultsSection.style.display = 'none';
            loaderOverlay.style.display = 'flex';
            
            try {
                const response = await fetch(BASE_API_URL);
                const json = await response.json();
                
                rawRows = json.rows || [];

                loaderOverlay.style.display = 'none';
                appContent.style.display = 'block';

                initializeStoreDropdown();
            } catch (error) {
                console.error(error);
                const textElement = loaderOverlay.querySelector('.loader-text');
                if(textElement) textElement.innerHTML = "<span style='color:#e74c3c;'>❌ Failed to load dataset from Sheet3.</span>";
            }
        }

        function formatIndianCurrency(num) {
            return '₹ ' + Number(num).toLocaleString('en-IN');
        }

        function initializeStoreDropdown() {
            storeSelect.innerHTML = '<option value="">-- SELECT STORE NAME --</option>';
            
            const stores = [...new Set(rawRows.map(r => r["STORE NAME"]))].filter(Boolean).sort();
            
            stores.forEach(store => {
                const option = new Option(store, store);
                storeSelect.add(option);
            });
        }

        function generateStoreReport() {
            const selectedStore = storeSelect.value;
            if (!selectedStore) {
                alert("Please select a Store Name first.");
                return;
            }

            tableMainHeader.innerText = selectedStore;

            let summaryMap = {};
            let grandTotalVolume = 0;
            let grandTotalValue = 0;

            rawRows.forEach(row => {
                if (String(row["STORE NAME"]).trim() !== selectedStore.trim()) return;

                const category = String(row["PRODUCT CATEGORY"] || 'UNKNOWN').trim().toUpperCase();
                const volume = parseInt(row["VOLUME"]) || 0;
                const value = parseFloat(row["VALUE"]) || 0;

                if (volume > 0 || value > 0) {
                    if (!summaryMap[category]) {
                        summaryMap[category] = { volume: 0, value: 0 };
                    }
                    summaryMap[category].volume += volume;
                    summaryMap[category].value += value;
                }
            });

            Object.values(summaryMap).forEach(c => {
                grandTotalVolume += c.volume;
                grandTotalValue += c.value;
            });

            inventoryTableBody.innerHTML = "";
            const sortedCategories = Object.keys(summaryMap).sort();

            if (sortedCategories.length === 0) {
                inventoryTableBody.innerHTML = `<tr><td colspan="3" class="text-center" style="color:#999; padding: 20px;">No records found for this store.</td></tr>`;
                resultsSection.style.display = 'block';
                return;
            }

            sortedCategories.forEach(category => {
                const data = summaryMap[category];

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="td-category">${category}</td>
                    <td class="data-cell">${data.volume}</td>
                    <td class="data-cell">${formatIndianCurrency(Math.round(data.value))}</td>
                `;
                inventoryTableBody.appendChild(row);
            });

            const totalRow = document.createElement('tr');
            totalRow.className = "tr-total";
            totalRow.innerHTML = `
                <td class="total-label">TOTAL</td>
                <td class="total-stock-val">${grandTotalVolume}</td>
                <td class="total-price-val">${formatIndianCurrency(Math.round(grandTotalValue))}</td>
            `;
            inventoryTableBody.appendChild(totalRow);

            resultsSection.style.display = 'block';
            resultsSection.scrollIntoView({ behavior: 'smooth' });
        }

        function resetApp() {
            storeSelect.value = "";
            resultsSection.style.display = 'none';
        }

        searchBtn.addEventListener('click', generateStoreReport);
        resetBtn.addEventListener('click', resetApp);
        storeSelect.addEventListener('change', () => { resultsSection.style.display = 'none'; });

        loadData();
    </script>
</body>
</html>
