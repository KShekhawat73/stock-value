<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiVMOR GADGETS - Stock Value Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 20px; background-color: #f4f6f9; color: #2c3e50; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .app-container { width: 100%; max-width: 480px; background: #ffffff; border-radius: 20px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); padding: 30px 24px; box-sizing: border-box; border: 1px solid rgba(226, 232, 240, 0.8); }
        .brand-logo { text-align: center; margin-bottom: 25px; }
        .brand-logo h1 { margin: 0; font-size: 26px; color: #0b3c5d; font-weight: 800; }
        .brand-logo p { margin: 6px 0 0 0; font-size: 11px; color: #8a99ad; letter-spacing: 1.5px; font-weight: 600; text-transform: uppercase; }
        .update-timestamp-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .update-timestamp { font-size: 13px; font-style: italic; color: #2979ff; }
        .loader-container { display: flex; flex-direction: column; align-items: center; padding: 40px 0; }
        .spinner-3d { width: 44px; height: 44px; border: 5px solid #e2e8f0; border-top: 5px solid #15803d; border-radius: 50%; animation: spin3d 1s linear infinite; }
        @keyframes spin3d { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .filter-group { margin-bottom: 18px; position: relative; }
        .filter-label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 6px; display: block; }
        select, .combo-box-btn { width: 100%; padding: 14px 18px; border: 1px solid #cbd5e1; border-radius: 8px; background: #fff; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .combo-dropdown { display: none; position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid #cbd5e1; border-radius: 8px; margin-top: 4px; max-height: 200px; overflow-y: auto; z-index: 100; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 4px 0; }
        .combo-dropdown.show { display: block; }
        .combo-item { display: flex; align-items: center; padding: 10px 14px; cursor: pointer; font-size: 13px; }
        .btn-group { display: flex; gap: 14px; margin-top: 25px; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-primary { background-color: #15803d; color: white; }
        .btn-secondary { background-color: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
        .action-panel { display: flex; justify-content: flex-end; gap: 8px; margin-top: 25px; }
        .btn-action { padding: 8px 12px; font-size: 12px; border: 1px solid #cbd5e1; background: #fff; border-radius: 6px; cursor: pointer; }
        .table-container { width: 100%; margin-top: 25px; border: 1px solid #cbd5e1; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { padding: 10px; background: #d9e1f2; text-align: left; border: 1px solid #cbd5e1; }
        td { padding: 10px; border: 1px solid #cbd5e1; }
        .tr-total { background: #fce4d6; font-weight: 800; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="brand-logo"><h1>SiVMOR STOCK VALUE</h1><p>STOCK VALUE TRACKER</p></div>
        <div class="update-timestamp-row"><div class="update-timestamp" id="lastUpdatedBox">Last Updated: --</div></div>
        
        <div id="loader-overlay" class="loader-container"><div class="spinner-3d"></div><div class="loader-text">Loading...</div></div>

        <div id="app-content" style="display: none;">
            <div class="filter-group"><label class="filter-label">Store Category</label><select id="categoryTypeSelect"><option value="ALL">-- ALL CATEGORIES --</option><option value="FRANCHISE">FRANCHISE</option><option value="OWNED">OWNED</option></select></div>
            <div class="filter-group"><label class="filter-label">Store Name</label><div class="combo-box-btn" id="storeComboBtn">-- ALL STORES --</div><div class="combo-dropdown" id="storeComboDropdown"></div></div>
            <div class="filter-group"><label class="filter-label">Product Category</label><div class="combo-box-btn" id="categoryComboBtn">-- ALL CATEGORIES --</div><div class="combo-dropdown" id="categoryComboDropdown"></div></div>
            <div class="btn-group"><button class="btn btn-primary" id="searchBtn">Search Filter</button><button class="btn btn-secondary" id="resetBtn">Reset All</button></div>
            
            <div id="resultsSection" style="display: none;">
                <div class="action-panel"><button class="btn-action" id="copyScreenshotBtn">📋 Copy Screenshot</button><button class="btn-action" id="downloadExcelBtn">📊 Download Excel</button></div>
                <div class="table-container" id="reportTableContainer">
                    <table><thead><tr><th>PRODUCT CATEGORY</th><th>VOLUME</th><th>VALUE</th></tr></thead><tbody id="inventoryTableBody"></tbody></table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE_API_URL = "https://script.google.com/macros/s/AKfycbwjC8eKRE-ZJxxl2mr_S4AY60ZYEbLTbZE0bE-v10NbgDqwQX9oNvBl-mDCfqaofbZE/exec?sheet=Sheet3";
        let rawRows = [], selectedStores = ["ALL"], selectedCategories = ["ALL"];

        window.handleAppsScriptResponse = (json) => {
            rawRows = json.rows || [];
            document.getElementById('loader-overlay').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            updateDropdowns();
        };

        function loadData() {
            const script = document.createElement('script');
            script.src = `${BASE_API_URL}&prefix=handleAppsScriptResponse&_ts=${new Date().getTime()}`;
            document.body.appendChild(script);
        }

        function createCheckbox(container, val, label, arr, onChange) {
            const div = document.createElement('div'); div.className = 'combo-item';
            div.innerHTML = `<input type="checkbox" value="${val}" ${arr.includes(val) ? 'checked' : ''}> <label>${label}</label>`;
            div.querySelector('input').onchange = (e) => onChange(val, e.target.checked);
            container.appendChild(div);
        }

        function updateDropdowns() {
            const storeDropdown = document.getElementById('storeComboDropdown');
            storeDropdown.innerHTML = '';
            createCheckbox(storeDropdown, "ALL", "-- ALL STORES --", selectedStores, (v, c) => { selectedStores = c ? ["ALL"] : []; updateDropdowns(); });
            [...new Set(rawRows.map(r => r["STORE NAME"]))].sort().forEach(s => createCheckbox(storeDropdown, s, s, selectedStores, (v, c) => { /* logic */ updateDropdowns(); }));
            
            const catDropdown = document.getElementById('categoryComboDropdown');
            catDropdown.innerHTML = '';
            createCheckbox(catDropdown, "ALL", "-- ALL CATEGORIES --", selectedCategories, (v, c) => { selectedCategories = c ? ["ALL"] : []; updateDropdowns(); });
            [...new Set(rawRows.map(r => r["PRODUCT CATEGORY"]))].sort().forEach(c => createCheckbox(catDropdown, c, c, selectedCategories, (v, c) => { /* logic */ updateDropdowns(); }));
        }

        document.getElementById('searchBtn').onclick = () => {
            const tbody = document.getElementById('inventoryTableBody');
            tbody.innerHTML = '';
            rawRows.filter(r => (selectedStores.includes("ALL") || selectedStores.includes(r["STORE NAME"]))).forEach(r => {
                tbody.innerHTML += `<tr><td>${r["PRODUCT CATEGORY"]}</td><td>${r["VOLUME"]}</td><td>${r["VALUE"]}</td></tr>`;
            });
            document.getElementById('resultsSection').style.display = 'block';
        };

        document.getElementById('copyScreenshotBtn').onclick = () => html2canvas(document.getElementById('reportTableContainer')).then(c => c.toBlob(b => navigator.clipboard.write([new ClipboardItem({"image/png": b})])));
        document.getElementById('downloadExcelBtn').onclick = () => { 
            let html = document.getElementById('reportTableContainer').innerHTML;
            let a = document.createElement('a'); a.href = 'data:application/vnd.ms-excel,' + encodeURIComponent(html); a.download = 'Report.xls'; a.click(); 
        };

        loadData();
    </script>
</body>
</html>
